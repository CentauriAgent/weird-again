<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0A0A0F;display:flex;align-items:center;justify-content:center;position:relative}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px)}
.orb1{width:400px;height:400px;background:rgba(124,58,237,.4);top:-100px;left:-50px}
.orb2{width:350px;height:350px;background:rgba(236,72,153,.3);bottom:-80px;right:-30px}
.orb3{width:250px;height:250px;background:rgba(6,182,212,.2);top:50%;left:60%;transform:translate(-50%,-50%)}
.content{position:relative;z-index:2;text-align:center;padding:0 60px}
h1{font-size:96px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#A855F7,#EC4899,#FBBF24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px;line-height:1.1}
p{font-size:36px;color:rgba(240,240,245,.7);font-weight:500;letter-spacing:.5px}
.badges{display:flex;gap:16px;justify-content:center;margin-top:30px}
.badge{background:rgba(255,255,255,.06);border:1px solid rgba(168,85,247,.25);border-radius:50px;padding:10px 24px;font-size:18px;color:rgba(240,240,245,.6)}
</style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>
<div class="content">
  <h1>Weird Again</h1>
  <p>The internet, but yours.</p>
  <div class="badges">
    <span class="badge">✨ No ads</span>
    <span class="badge">🔒 No tracking</span>
    <span class="badge">💜 No overlords</span>
  </div>
</div>
</body>
</html>
